{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block extra_css %}
<style>
.chat-container {
    max-width: 900px;
    margin: 80px auto 20px;
    height: calc(100vh - 160px);
    display: flex;
    flex-direction: column;
    background: rgba(15, 15, 35, 0.9);
    border-radius: 20px;
    border: 1px solid rgba(0, 255, 255, 0.2);
    overflow: hidden;
}
.chat-header {
    padding: 15px 20px;
    background: linear-gradient(135deg, #0a0a2e, #1a1a4e);
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    display: flex;
    align-items: center;
    gap: 12px;
}
.chat-header .bot-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #00f5ff, #7b2ff7);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
}
.chat-header h5 { margin: 0; color: #00f5ff; }
.chat-header .status { color: #00ff88; font-size: 12px; }
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
}
.chat-msg {
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
}
.chat-msg.user { flex-direction: row-reverse; }
.chat-msg .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.chat-msg.bot .msg-avatar {
    background: linear-gradient(135deg, #00f5ff, #7b2ff7);
}
.chat-msg.user .msg-avatar {
    background: linear-gradient(135deg, #ff6b6b, #ffa500);
}
.chat-msg .msg-bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    white-space: pre-wrap;
}
.chat-msg.bot .msg-bubble {
    background: rgba(0, 245, 255, 0.1);
    border: 1px solid rgba(0, 245, 255, 0.2);
    color: #e0e0e0;
    border-top-left-radius: 4px;
}
.chat-msg.user .msg-bubble {
    background: linear-gradient(135deg, #7b2ff7, #00f5ff);
    color: white;
    border-top-right-radius: 4px;
}
.chat-msg .msg-mode {
    font-size: 10px;
    color: #666;
    margin-top: 4px;
}
.chat-input-area {
    padding: 15px 20px;
    background: rgba(15, 15, 35, 0.95);
    border-top: 1px solid rgba(0, 255, 255, 0.2);
    display: flex;
    gap: 10px;
}
.chat-input-area input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 25px;
    padding: 10px 20px;
    color: white;
    outline: none;
}
.chat-input-area input:focus {
    border-color: #00f5ff;
    box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
}
.chat-input-area button {
    background: linear-gradient(135deg, #00f5ff, #7b2ff7);
    border: none;
    border-radius: 25px;
    padding: 10px 24px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}
.chat-input-area button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
}
.quick-actions {
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.quick-btn {
    background: rgba(0, 245, 255, 0.1);
    border: 1px solid rgba(0, 245, 255, 0.3);
    border-radius: 20px;
    padding: 5px 15px;
    color: #00f5ff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}
.quick-btn:hover {
    background: rgba(0, 245, 255, 0.2);
}
.typing-indicator {
    display: none;
    padding: 0 20px;
    color: #666;
    font-size: 12px;
}
.typing-indicator.show { display: block; }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div class="bot-avatar"><i class="fas fa-robot"></i></div>
        <div>
            <h5>智能导购助手</h5>
            <span class="status"><i class="fas fa-circle"></i> 在线</span>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <!-- 消息区域 -->
    </div>
    <div class="typing-indicator" id="typingIndicator">正在输入...</div>
    <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('推荐手机')">推荐手机</button>
        <button class="quick-btn" onclick="sendQuick('有什么新品')">有什么新品</button>
        <button class="quick-btn" onclick="sendQuick('笔记本电脑')">笔记本电脑</button>
        <button class="quick-btn" onclick="sendQuick('耳机推荐')">耳机推荐</button>
        <button class="quick-btn" onclick="sendQuick('游戏外设')">游戏外设</button>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="输入您想了解的数码产品..." 
               onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> 发送</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const sessionId = '{{ session_id }}';

// 加载聊天历史
window.onload = function() {
    fetch(`/chatbot/history/?session_id=${sessionId}`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('chatMessages');
            if (data.messages.length === 0) {
                appendMessage('bot', '您好！我是数码潮品商城的智能导购助手 🤖\n\n我可以帮您：\n1. 推荐数码产品\n2. 查找特定商品\n3. 解答购物疑问\n\n请问有什么可以帮您的吗？', 'default');
            } else {
                data.messages.forEach(msg => {
                    appendMessage(msg.role, msg.content, msg.mode);
                });
            }
            scrollToBottom();
        });
};

function appendMessage(role, content, mode) {
    const container = document.getElementById('chatMessages');
    const modeText = mode === 'keyword' ? '[关键词匹配]' : mode === 'llm' ? '[大模型]' : '';
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.innerHTML = `
        <div class="msg-avatar">
            <i class="fas fa-${role === 'bot' ? 'robot' : 'user'}"></i>
        </div>
        <div>
            <div class="msg-bubble">${content}</div>
            ${modeText ? `<div class="msg-mode">${modeText}</div>` : ''}
        </div>
    `;
    container.appendChild(div);
}

function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    appendMessage('user', message, '');
    input.value = '';
    scrollToBottom();

    // 显示输入中
    document.getElementById('typingIndicator').classList.add('show');

    fetch('/chatbot/send/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({
            message: message,
            session_id: sessionId,
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('typingIndicator').classList.remove('show');
        if (data.status === 'success') {
            appendMessage('bot', data.reply, data.mode);
        } else {
            appendMessage('bot', '抱歉，我暂时无法回复，请稍后再试。', 'default');
        }
        scrollToBottom();
    })
    .catch(() => {
        document.getElementById('typingIndicator').classList.remove('show');
        appendMessage('bot', '网络异常，请稍后再试。', 'default');
        scrollToBottom();
    });
}

function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
}
</script>
{% endblock %}
