{% extends 'base.html' %}

{% block title %}登录 - 数码潮品商城{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <i class="fas fa-sign-in-alt fa-2x"></i>
                    <h3>欢迎回来</h3>
                    <p class="text-muted">登录数码潮品商城</p>
                </div>
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-neon w-100">登录</button>
                </form>
                <div class="auth-footer">
                    还没有账号？<a href="{% url 'Users:UserRegister' %}">立即注册</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
